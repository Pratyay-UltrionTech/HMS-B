# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - HMS-Ultrion-Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: HMS-Ultrion-Dev
  # 3.14 hits SQLAlchemy typing bugs; 3.12 is the stable App Service target for this stack.
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # App Service extracts antenv.tar.gz into /antenv and sets
      # PYTHONPATH=/antenv/lib/pythonX.Y/site-packages. The archive root must be
      # bin/, lib/, … — NOT a nested antenv/ folder (that causes ModuleNotFoundError).
      - name: Create virtual environment and package antenv.tar.gz
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import fastapi, sqlalchemy; print('fastapi', fastapi.__version__); print('sqlalchemy', sqlalchemy.__version__)"
          PY_XY=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          deactivate
          # Pack venv contents at archive root (Oryx extracts into /antenv)
          tar -czf antenv.tar.gz -C antenv .
          rm -rf antenv
          echo "Archive top entries (must be bin/ lib/ etc, not antenv/):"
          tar -tzf antenv.tar.gz | head -n 20
          ls -lh antenv.tar.gz
          mkdir -p /tmp/antenv-check
          tar -xzf antenv.tar.gz -C /tmp/antenv-check
          test -d "/tmp/antenv-check/lib/python${PY_XY}/site-packages/fastapi"
          echo "antenv.tar.gz layout OK for python${PY_XY}"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          include-hidden-files: true
          path: |
            .
            !.git/
            !.github/
            !.env
            !.env.*
            !**/__pycache__/
            !**/*.pyc
            !.pytest_cache/
            !.mypy_cache/
            !.venv/
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_88C1B4ABDB2C4CC68B2921E517193E28 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_722F9F68A94142E7BCE13E5BAD0CA697 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_67EF4B9861994501B8A26C1372B75344 }}

      # Disabling remote build avoids long Oryx runs that collide with SCM restarts.
      # Also pin the App Service runtime to Python 3.12 to match the built antenv.
      - name: Align App Service runtime and disable remote Oryx if needed
        id: appsettings
        run: |
          set -euo pipefail
          RG=$(az webapp list --query "[?name=='${{ env.APP_NAME }}'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for ${{ env.APP_NAME }}"
            exit 1
          fi
          echo "RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"

          NEED_UPDATE=false

          CURRENT_FX=$(az webapp config show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "$RG" \
            --query "linuxFxVersion" -o tsv)
          TARGET_FX="PYTHON|${{ env.PYTHON_VERSION }}"
          if [ "$CURRENT_FX" != "$TARGET_FX" ]; then
            echo "Updating linuxFxVersion from '$CURRENT_FX' to '$TARGET_FX'..."
            az webapp config set \
              --name "${{ env.APP_NAME }}" \
              --resource-group "$RG" \
              --linux-fx-version "$TARGET_FX" \
              --output none
            NEED_UPDATE=true
          fi

          SCM_BUILD=$(az webapp config appsettings list \
            --name "${{ env.APP_NAME }}" \
            --resource-group "$RG" \
            --query "[?name=='SCM_DO_BUILD_DURING_DEPLOYMENT'].value | [0]" -o tsv)
          ORYX_BUILD=$(az webapp config appsettings list \
            --name "${{ env.APP_NAME }}" \
            --resource-group "$RG" \
            --query "[?name=='ENABLE_ORYX_BUILD'].value | [0]" -o tsv)

          if [ "${SCM_BUILD}" != "false" ] || [ "${ORYX_BUILD}" != "false" ]; then
            echo "Updating app settings to disable remote build..."
            az webapp config appsettings set \
              --name "${{ env.APP_NAME }}" \
              --resource-group "$RG" \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false \
              --output none
            NEED_UPDATE=true
          fi

          if [ "$NEED_UPDATE" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Runtime and build settings already aligned."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for SCM to settle after settings change
        if: steps.appsettings.outputs.changed == 'true'
        run: |
          echo "App settings change restarts SCM; waiting 90s before deploy..."
          sleep 90

      - name: Brief settle before deploy
        if: steps.appsettings.outputs.changed != 'true'
        run: sleep 20

      - name: Deploy to Azure Web App
        id: deploy
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: Production

      - name: Wait before deploy retry
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "First deploy failed (often SCM restart). Waiting 90s then retrying..."
          sleep 90

      - name: Deploy to Azure Web App (retry)
        id: deploy-retry
        if: steps.deploy.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: Production

      - name: Fail if deploy still unsuccessful
        if: steps.deploy.outcome == 'failure' && steps.deploy-retry.outcome != 'success'
        run: |
          echo "Deployment failed after retry."
          exit 1
